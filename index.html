}

function MembersSection() {
  const [searchTerm, setSearchTerm] = useState('');
  const [filter, setFilter] = useState('All');
  const [sortBy, setSortBy] = useState('name');

  const filteredMembers = useMemo(() => {
    let result = MOCK_MEMBERS;

    if (searchTerm) {
      result = result.filter(m =>
        m.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        m.institution.toLowerCase().includes(searchTerm.toLowerCase()) ||
        m.role.toLowerCase().includes(searchTerm.toLowerCase()) ||
        m.expertise.some(e => e.toLowerCase().includes(searchTerm.toLowerCase()))
      );
    }

    if (sortBy === 'name') {
      result.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sortBy === 'class') {
      result.sort((a, b) => parseInt(b.class) - parseInt(a.class));
    }

    return result;
  }, [searchTerm, sortBy]);

  return (
    <section style={{ padding: '3rem 2rem', background: 'var(--white)' }}>
      <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
        <h2 style={{ 
          fontSize: '2rem',
          marginBottom: '2rem',
          color: 'var(--navy)',
          fontWeight: 700,
          fontFamily: "'Playfair Display', serif"
        }}>
          Alumni Directory ({filteredMembers.length})
        </h2>

        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
          gap: '1.5rem',
          marginBottom: '2rem'
        }}>
          <div>
            <label style={{ display: 'block', marginBottom: '0.5rem', color: 'var(--text)', fontWeight: 500 }}>
              Search Members
            </label>
            <input
              type="text"
              placeholder="Search by name, institution, role, or expertise..."
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              style={{
                width: '100%',
                padding: '0.75rem',
                border: `1px solid var(--border)`,
                borderRadius: 'var(--radius)',
                fontSize: '1rem',
                fontFamily: 'inherit'
              }}
            />
          </div>
          <div>
            <label style={{ display: 'block', marginBottom: '0.5rem', color: 'var(--text)', fontWeight: 500 }}>
              Sort By
            </label>
            <select
              value={sortBy}
              onChange={(e) => setSortBy(e.target.value)}
              style={{
                width: '100%',
                padding: '0.75rem',
                border: `1px solid var(--border)`,
                borderRadius: 'var(--radius)',
                fontSize: '1rem',
                fontFamily: 'inherit',
                background: 'var(--white)',
                cursor: 'pointer'
              }}
            >
              <option value="name">Name (A-Z)</option>
              <option value="class">Graduation Year (Newest First)</option>
            </select>
          </div>
        </div>

        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
          gap: '2rem'
        }}>
          {filteredMembers.map(member => (
            <MemberCard key={member.id} member={member} />
          ))}
        </div>

        {filteredMembers.length === 0 && (
          <div style={{
            textAlign: 'center',
            padding: '3rem 2rem',
            color: 'var(--text-secondary)'
          }}>
            <p style={{ fontSize: '1.1rem' }}>No members match your search.</p>
          </div>
        )}
      </div>
    </section>
  );
}

function MemberCard({ member }) {
  const [showDetails, setShowDetails] = useState(false);

  return (
    <div style={{
      background: 'var(--white)',
      borderRadius: 'var(--radius-lg)',
      overflow: 'hidden',
      boxShadow: 'var(--shadow)',
      border: `1px solid var(--border-light)`,
      transition: 'all 0.3s ease',
      cursor: 'pointer',
      animation: 'fadeIn 0.5s ease-out'
    }}
    onMouseEnter={(e) => e.currentTarget.style.boxShadow = 'var(--shadow-lg)'}
    onMouseLeave={(e) => e.currentTarget.style.boxShadow = 'var(--shadow)'}
    >
      <div style={{
        background: 'linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%)',
        padding: '1.5rem',
        textAlign: 'center',
        color: 'var(--white)'
      }}>
        <img
          src={member.image}
          alt={member.name}
          style={{
            width: '80px',
            height: '80px',
            borderRadius: '50%',
            marginBottom: '1rem',
            border: `3px solid var(--gold)`,
            objectFit: 'cover'
          }}
        />
        <h3 style={{ fontSize: '1.2rem', fontWeight: 700, marginBottom: '0.25rem' }}>
          {member.name}
        </h3>
        <p style={{ fontSize: '0.85rem', opacity: 0.9, marginBottom: '0.5rem' }}>
          Class of {member.class}
        </p>
      </div>

      <div style={{ padding: '1.5rem' }}>
        <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', marginBottom: '0.75rem', fontWeight: 500 }}>
          {member.role}
        </p>
        <p style={{ color: 'var(--text)', fontSize: '0.85rem', marginBottom: '1rem' }}>
          {member.institution}
        </p>

        <div style={{ marginBottom: '1rem' }}>
          <p style={{ color: 'var(--text-secondary)', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '0.5rem', fontWeight: 600 }}>
            Expertise
          </p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
            {member.expertise.map((skill, idx) => (
              <span
                key={idx}
                style={{
                  fontSize: '0.75rem',
                  background: 'var(--border-light)',
                  color: 'var(--navy)',
                  padding: '0.3rem 0.7rem',
                  borderRadius: '12px',
                  fontWeight: 500
                }}
              >
                {skill}
              </span>
            ))}
          </div>
        </div>

        <button
          onClick={() => setShowDetails(!showDetails)}
          style={{
            width: '100%',
            padding: '0.75rem',
            background: 'var(--gold)',
            color: 'var(--navy)',
            border: 'none',
            borderRadius: 'var(--radius)',
            fontSize: '0.9rem',
            fontWeight: 600,
            cursor: 'pointer',
            transition: 'all 0.3s ease'
          }}
          onMouseEnter={(e) => {
            e.currentTarget.style.background = 'var(--gold-light)';
          }}
          onMouseLeave={(e) => {
            e.currentTarget.style.background = 'var(--gold)';
          }}
        >
          {showDetails ? 'Hide Details' : 'View Contact'}
        </button>

        {showDetails && (
          <div style={{
            marginTop: '1rem',
            paddingTop: '1rem',
            borderTop: `1px solid var(--border)`,
            animation: 'fadeIn 0.3s ease-out'
          }}>
            <p style={{ fontSize: '0.85rem', color: 'var(--text)', marginBottom: '0.5rem' }}>
              <strong>Location:</strong> {member.location}
            </p>
            <p style={{ fontSize: '0.85rem', color: 'var(--text)', marginBottom: '0.5rem' }}>
              <strong>Email:</strong> <a href={`mailto:${member.email}`} style={{ color: 'var(--gold)', textDecoration: 'none' }}>{member.email}</a>
            </p>
            <p style={{ fontSize: '0.85rem', color: 'var(--text)' }}>
              <strong>Phone:</strong> <a href={`tel:${member.phone}`} style={{ color: 'var(--gold)', textDecoration: 'none' }}>{member.phone}</a>
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

  return (

      color: 'var(--white)',
      padding: '3rem 2rem',

      <h3 style={{ fontSize: '1.3rem', marginBottom: '1rem', fontFamily: "'Playfair Display', serif" }}>

      </p>
      <p style={{ fontSize: '0.8rem', opacity: 0.6 }}>

      </p>
    </footer>

}

// ============= MAIN APP =============

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
