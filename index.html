function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function generateAlumniFromMembers() {
  const rng = seededRandom(42);
  const pick = arr => arr[Math.floor(rng() * arr.length)];
  return REAL_MEMBERS.map((m, i) => {
    // Generate random defaults (keeps RNG sequence stable)
    const randGradYear = m.y || pick(GRAD_YEARS);
    const randField = pick(PHARMACY_FIELDS);
    const randCompany = pick(COMPANIES);
    const randPosition = pick(POSITIONS);
    const randCity = pick(CITIES);
    const isCurrent = rng() > 0.2;
    const fn = m.f.toLowerCase().replace(/[^a-z']/g,'');
    const ln = (m.l || 'xu').toLowerCase().replace(/[^a-z]/g,'');
    const randEmail = fn && ln ? `${fn}.${ln}${Math.floor(rng()*99)}@email.com` : `${fn||ln}${Math.floor(rng()*99)}@email.com`;
    const hasLinkedIn = rng() > 0.3;
    const randYearsExp = Math.max(0, 2026 - randGradYear - Math.floor(rng()*3));
    const numRoles = rng() < 0.35 ? (rng() < 0.6 ? 1 : 2) : 0;
    const additionalRoles = [];
    for (let r = 0; r < numRoles; r++) {
      const role = ADDITIONAL_ROLES[Math.floor(rng() * ADDITIONAL_ROLES.length)];
      if (!additionalRoles.includes(role)) additionalRoles.push(role);
    }
    const randColor = `hsl(${Math.floor(rng()*360)}, 45%, 42%)`;

    // Check for survey override
    const key = `${m.f}|${m.l}`;
    const ov = SURVEY_OVERRIDES[key];
    const firstName = m.f;
    const lastName = m.l;
    const gradYear = ov ? (ov.gradYear || randGradYear) : randGradYear;
    const field = ov ? (ov.field || randField) : randField;
    const company = ov ? (ov.company || randCompany) : randCompany;
    const position = ov ? (ov.position || randPosition) : randPosition;
    const city = ov ? (ov.city || randCity) : randCity;
    const email = ov ? (ov.email || randEmail) : randEmail;
    const yearsExp = ov ? Math.max(0, 2026 - gradYear) : randYearsExp;
    const initials = (firstName[0]||'') + (lastName[0]||'');
    return {
      id: i + 1, firstName, lastName, gradYear, field, company,
      position, city, isCurrent: ov ? true : isCurrent, email, hasLinkedIn, yearsExp,
      avatar: initials || firstName.slice(0,2),
      color: randColor,
      additionalRoles,
      hasSurveyData: !!ov
    };
  });
}

              </div>
              <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(count/maxCompany)*100}%`,background:'linear-gradient(90deg, var(--navy), var(--navy-mid))',borderRadius:3,transition:'width .4s ease'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'var(--white)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
          <BarChartIcon size={18}/> Top Pharmacy Fields
        </h3>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {topFields.map(([name, count]) => (
            <div key={name}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                <span style={{fontWeight:500}}>{name}</span>
                <span style={{color:'var(--text-muted)'}}>{count} alumni</span>
              </div>
              <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(count/maxField)*100}%`,background:'linear-gradient(90deg, var(--gold), var(--gold-light))',borderRadius:3,transition:'width .4s ease'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{gridColumn:'1 / -1',background:'var(--white)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
          <MapPinIcon size={18}/> Where Our Alumni Are
        </h3>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {topCities.map(([city, count]) => (
            <div key={city} style={{
              padding:'10px 18px',borderRadius:'var(--radius)',
              background:'var(--bg)',border:'1px solid var(--border-light)',
              textAlign:'center',minWidth:140
            }}>
              <div style={{fontWeight:700,fontSize:20,color:'var(--navy)'}}>{count}</div>
              <div style={{fontSize:12,color:'var(--text-muted)'}}>{city}</div>
            </div>
          ))}
        </div>
      
      <div style={{background:'var(--white)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)'}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
          <BarChartIcon size={18}/> Top Additional Roles
        </h3>
        {topAdditionalRoles.length > 0 ? (
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {topAdditionalRoles.map(([name, count]) => (
              <div key={name}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:500}}>{name}</span>
                  <span style={{color:'var(--text-muted)'}}>{count} alumni</span>
                </div>
                <div style={{height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${(count/maxRoles)*100}%`,background:'linear-gradient(90deg, var(--coral), var(--coral-light))',borderRadius:3,transition:'width .4s ease'}}/>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:14}}>No additional roles found</div>
        )}
      </div>
</div>
    </div>
  );
}

// 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙 MAIN APP 脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙脙垄脗聰脗聙
function App() {
  const [search, setSearch] = useState('');
  const [fieldFilter, setFieldFilter] = useState('');
  const [companyFilter, setCompanyFilter] = useState('');
  const [additionalRoleFilter, setAdditionalRoleFilter] = useState('');
  const [positionFilter, setPositionFilter] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [yearFilter, setYearFilter] = useState('');
  const [viewMode, setViewMode] = useState('grid');
  const [activeTab, setActiveTab] = useState('directory');
  const [contactPerson, setContactPerson] = useState(null);
  const [showUpload, setShowUpload] = useState(false);
  const [showFilters, setShowFilters] = useState(true);
  const [page, setPage] = useState(1);
  const PER_PAGE = viewMode === 'grid' ? 12 : 20;

  const filtered = useMemo(() => {
    return ALUMNI_DATA.filter(p => {
      const q = search.toLowerCase();
      const matchesSearch = !q ||
        `${p.firstName} ${p.lastName}`.toLowerCase().includes(q) ||
        p.company.toLowerCase().includes(q) ||
        p.position.toLowerCase().includes(q) ||
        p.field.toLowerCase().includes(q) ||
        p.city.toLowerCase().includes(q) ||
        p.additionalRoles.some(r => r.toLowerCase().includes(q));
      const matchesField = !fieldFilter || p.field === fieldFilter;
      const matchesCompany = !companyFilter || p.company === companyFilter;
      const matchesPosition = !positionFilter || p.position === positionFilter;
      const matchesStatus = !statusFilter ||
        (statusFilter === 'current' && p.isCurrent) ||
        (statusFilter === 'past' && !p.isCurrent);
      const matchesYear = !yearFilter || String(p.gradYear) === yearFilter;
      const matchesAdditionalRole = !additionalRoleFilter || (p.additionalRoles && p.additionalRoles.includes(additionalRoleFilter));
      return matchesSearch && matchesField && matchesCompany && matchesPosition && matchesStatus && matchesYear && matchesAdditionalRole;
    });
  }, [search, fieldFilter, companyFilter, positionFilter, statusFilter, yearFilter, additionalRoleFilter]);

  const paginated = filtered.slice(0, page * PER_PAGE);
  const hasMore = paginated.length < filtered.length;
  const activeFilters = [fieldFilter, companyFilter, positionFilter, statusFilter, yearFilter].filter(Boolean).length;

  const clearFilters = () => {
    setFieldFilter('');setCompanyFilter('');setPositionFilter('');setStatusFilter('');setYearFilter('');setAdditionalRoleFilter('');setSearch('');
  };

  const uniqueAdditionalRoles = useMemo(() => {
    return [...new Set(ALUMNI_DATA.flatMap(p => p.additionalRoles || []))].sort();
  }, []);

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 HEADER 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      <header style={{
        background:'var(--navy)',color:'#fff',position:'sticky',top:0,zIndex:100,
        boxShadow:'0 2px 20px rgba(10,22,40,0.3)'
      }}>
        <div style={{maxWidth:1320,margin:'0 auto',padding:'0 28px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:68}}>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              {/* Logo mark */}
              <div style={{
                width:40,height:40,borderRadius:10,
                background:'linear-gradient(135deg, var(--gold), var(--gold-dark))',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800,color:'var(--navy)'
              }}>X</div>
              <div>
                <div style={{fontSize:18,fontWeight:700,letterSpacing:'-0.3px',lineHeight:1.1}}>XUPharmConnect</div>
                <div style={{fontSize:11,opacity:0.6,letterSpacing:'0.5px'}}>XAVIER COLLEGE OF PHARMACY NETWORK</div>
              </div>
            </div>
            <nav style={{display:'flex',gap:4}}>
              {[['directory','Directory'],['insights','Insights']].map(([key,label])=>(
                <button key={key} onClick={()=>{setActiveTab(key);setPage(1)}} style={{
                  padding:'8px 18px',borderRadius:6,border:'none',fontSize:14,fontWeight:500,
                  background: activeTab===key ? 'rgba(255,197,48,0.15)' : 'transparent',
                  color: activeTab===key ? 'var(--gold)' : 'rgba(255,255,255,0.65)',
                  transition:'all .15s'
                }}>{label}</button>
              ))}
            </nav>
            <button onClick={()=>setShowUpload(true)} style={{
              padding:'9px 20px',borderRadius:'var(--radius)',border:'none',
              background:'var(--gold)',color:'var(--navy)',fontWeight:700,fontSize:14,
              display:'flex',alignItems:'center',gap:7,transition:'background .15s'
            }}
            onMouseEnter={e=>e.target.style.background='var(--gold-light)'}
            onMouseLeave={e=>e.target.style.background='var(--gold)'}
            ><UploadIcon size={16}/> Join Network</button>
          </div>
        </div>
      </header>

      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 HERO BANNER 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      <div style={{
        background:'linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, var(--navy-mid) 100%)',
        padding:'36px 28px 32px',position:'relative',overflow:'hidden'
      }}>
        {/* Decorative circles */}
        <div style={{position:'absolute',top:-60,right:-40,width:200,height:200,borderRadius:'50%',background:'rgba(255,197,48,0.05)'}}/>
        <div style={{position:'absolute',bottom:-80,left:'30%',width:300,height:300,borderRadius:'50%',background:'rgba(255,197,48,0.03)'}}/>

        <div style={{maxWidth:1320,margin:'0 auto',position:'relative',zIndex:1}}>
          <h1 style={{
            fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:800,color:'#fff',
            marginBottom:6,lineHeight:1.2
          }}>Find Your Xavier Pharmacy Network</h1>
          <p style={{color:'rgba(255,255,255,0.6)',fontSize:15,marginBottom:24,maxWidth:600}}>
            Connect with {ALUMNI_DATA.length}+ alumni and current students across every field of pharmacy. Search by company, specialty, or position.
          </p>

          {/* Search bar */}
          <div style={{display:'flex',gap:10,maxWidth:640}}>
            <div style={{flex:1,position:'relative'}}>
              <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>
                <SearchIcon size={18}/>
              </div>
              <input
                value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}}
                placeholder="Search by name, company, position, field, or city..."
                style={{
                  width:'100%',padding:'13px 14px 13px 42px',borderRadius:'var(--radius)',
                  border:'2px solid transparent',fontSize:15,outline:'none',
                  background:'var(--white)',transition:'border-color .2s'
                }}
                onFocus={e=>e.target.style.borderColor='var(--gold)'}
                onBlur={e=>e.target.style.borderColor='transparent'}
              />
            </div>
            <button onClick={()=>setShowFilters(!showFilters)} style={{
              padding:'0 18px',borderRadius:'var(--radius)',
              border: showFilters ? '2px solid var(--gold)' : '2px solid rgba(255,255,255,0.2)',
              background: showFilters ? 'rgba(255,197,48,0.1)' : 'rgba(255,255,255,0.05)',
              color: showFilters ? 'var(--gold)' : 'rgba(255,255,255,0.7)',
              fontSize:14,fontWeight:500,display:'flex',alignItems:'center',gap:6,
              transition:'all .15s',position:'relative'
            }}>
              <FilterIcon size={16}/> Filters
              {activeFilters > 0 && (
                <span style={{
                  position:'absolute',top:-6,right:-6,width:20,height:20,borderRadius:'50%',
                  background:'var(--gold)',color:'var(--navy)',fontSize:11,fontWeight:700,
                  display:'flex',alignItems:'center',justifyContent:'center'
                }}>{activeFilters}</span>
              )}
            </button>
          </div>
        </div>
      </div>

      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 FILTERS 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      {showFilters && activeTab === 'directory' && (
        <div className="animate-fade" style={{
          background:'var(--white)',borderBottom:'1px solid var(--border-light)',
          padding:'16px 28px'
        }}>
          <div style={{maxWidth:1320,margin:'0 auto',display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
            <SelectDropdown label="Field of Pharmacy" value={fieldFilter} onChange={v=>{setFieldFilter(v);setPage(1)}} options={PHARMACY_FIELDS} placeholder="All Fields"/>
            <SelectDropdown label="Company" value={companyFilter} onChange={v=>{setCompanyFilter(v);setPage(1)}} options={COMPANIES.sort()} placeholder="All Companies"/>
            <SelectDropdown label="Position" value={positionFilter} onChange={v=>{setPositionFilter(v);setPage(1)}} options={POSITIONS} placeholder="All Positions"/>
            <SelectDropdown label="Status" value={statusFilter} onChange={v=>{setStatusFilter(v);setPage(1)}} options={['current','past']} placeholder="Current & Past"/>
            <SelectDropdown label="Add'l Roles" value={additionalRoleFilter} onChange={v=>{setAdditionalRoleFilter(v);setPage(1)}} options={uniqueAdditionalRoles} placeholder="All Roles"/>
            <SelectDropdown label="Grad Year" value={yearFilter} onChange={v=>{setYearFilter(v);setPage(1)}} options={GRAD_YEARS.map(String)} placeholder="All Years"/>
            {activeFilters > 0 && (
              <button onClick={clearFilters} style={{
                padding:'10px 16px',borderRadius:'var(--radius)',border:'1px solid var(--border)',
                background:'transparent',fontSize:13,fontWeight:500,color:'var(--text-secondary)',
                display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap',marginBottom:0,
                alignSelf:'flex-end'
              }}><XIcon size={14}/> Clear all</button>
            )}
          </div>
        </div>
      )}

      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 CONTENT 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      <main style={{flex:1,maxWidth:1320,margin:'0 auto',padding:'24px 28px',width:'100%'}}>
        {activeTab === 'directory' && (
          <>
            {/* Toolbar */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontSize:14,color:'var(--text-secondary)'}}>
                <strong style={{color:'var(--text)'}}>{filtered.length}</strong> alumni found
                {activeFilters > 0 && <span> with {activeFilters} filter{activeFilters>1?'s':''} applied</span>}
              </div>
              <div style={{display:'flex',gap:4,background:'var(--bg)',borderRadius:'var(--radius)',padding:3}}>
                {[['grid',<GridIcon size={16}/>],['list',<ListIcon size={16}/>]].map(([mode,icon])=>(
                  <button key={mode} onClick={()=>{setViewMode(mode);setPage(1)}} style={{
                    padding:'6px 12px',borderRadius:6,border:'none',
                    background: viewMode===mode ? 'var(--white)' : 'transparent',
                    boxShadow: viewMode===mode ? 'var(--shadow)' : 'none',
                    color: viewMode===mode ? 'var(--navy)' : 'var(--text-muted)',
                    display:'flex',alignItems:'center',transition:'all .15s'
                  }}>{icon}</button>
                ))}
              </div>
            </div>

            {/* Results */}
            {filtered.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 20px'}}>
                <div style={{fontSize:48,marginBottom:12}}>脙掳脗聼脗聰脗聧</div>
                <h3 style={{fontSize:18,fontWeight:600,marginBottom:8}}>No alumni found</h3>
                <p style={{color:'var(--text-muted)',fontSize:14,marginBottom:16}}>Try adjusting your filters or search terms.</p>
                <button onClick={clearFilters} style={{padding:'10px 20px',borderRadius:'var(--radius)',border:'none',background:'var(--navy)',color:'#fff',fontSize:14,fontWeight:600}}>Clear All Filters</button>
              </div>
            ) : viewMode === 'grid' ? (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))',gap:16}}>
                {paginated.map(p => <AlumniCard key={p.id} person={p} onContact={setContactPerson} viewMode="grid"/>)}
              </div>
            ) : (
              <div style={{background:'var(--white)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow)',overflow:'hidden'}}>
                {/* List header */}
                <div style={{display:'flex',alignItems:'center',gap:16,padding:'10px 20px',background:'var(--bg)',fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.5px'}}>
                  <div style={{width:42}}/>
                  <div style={{flex:1}}>Name</div>
                  <div style={{minWidth:100,textAlign:'center'}}>Field</div>
                  <div style={{minWidth:60,textAlign:'center'}}>Year</div>
                  <div style={{minWidth:120}}>Location</div>
                  <div style={{minWidth:68}}>Status</div>
                  <div style={{minWidth:72}}>Actions</div>
                </div>
                {paginated.map(p => <AlumniCard key={p.id} person={p} onContact={setContactPerson} viewMode="list"/>)}
              </div>
            )}

            {/* Load more */}
            {hasMore && (
              <div style={{textAlign:'center',marginTop:24}}>
                <button onClick={()=>setPage(p=>p+1)} style={{
                  padding:'12px 32px',borderRadius:'var(--radius)',border:'2px solid var(--navy)',
                  background:'transparent',color:'var(--navy)',fontSize:14,fontWeight:600,
                  transition:'all .15s'
                }}
                onMouseEnter={e=>{e.target.style.background='var(--navy)';e.target.style.color='#fff'}}
                onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color='var(--navy)'}}
                >Load More ({filtered.length - paginated.length} remaining)</button>
              </div>
            )}
          </>
        )}

        {activeTab === 'insights' && <InsightsPanel data={filtered}/>}
      </main>

      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 STATS BAR 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      <div style={{background:'var(--white)',borderTop:'1px solid var(--border-light)',padding:'16px 28px'}}>
        <div style={{maxWidth:1320,margin:'0 auto',display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:16}}>
          <StatCard icon={<GraduationIcon size={22}/>} label="Total Alumni" value={ALUMNI_DATA.length}/>
          <StatCard icon={<UserIcon size={24}/>} label="Alumni with Side Roles" value={ALUMNI_DATA.filter(a => a.additionalRoles.length > 0).length} accent="var(--coral)" />
          <StatCard icon={<BuildingIcon size={22}/>} label="Companies Represented" value={new Set(ALUMNI_DATA.map(p=>p.company)).size} accent="var(--teal)"/>
          <StatCard icon={<BriefcaseIcon size={22}/>} label="Pharmacy Fields" value={new Set(ALUMNI_DATA.map(p=>p.field)).size} accent="var(--navy-mid)"/>
          <StatCard icon={<MapPinIcon size={22}/>} label="Cities Covered" value={new Set(ALUMNI_DATA.map(p=>p.city)).size} accent="#e85d75"/>
        </div>
      </div>

      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 FOOTER 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      <footer style={{background:'var(--navy)',color:'rgba(255,255,255,0.5)',padding:'20px 28px',fontSize:12,textAlign:'center'}}>
        <div style={{maxWidth:1320,margin:'0 auto'}}>
          XUPharmConnect 脙垄脗聙脗聰 A Vision for the Affinity Group 脙聜脗路 Xavier University of Louisiana College of Pharmacy 脙聜脗路 Powered by XULA Alumni
        </div>
      </footer>

      {/* 脙垄脗聰脗聙脙垄脗聰脗聙 MODALS 脙垄脗聰脗聙脙垄脗聰脗聙 */}
      {contactPerson && <ContactModal person={contactPerson} onClose={()=>setContactPerson(null)}/>}
      {showUpload && <UploadModal onClose={()=>setShowUpload(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
